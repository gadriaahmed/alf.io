name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradlew') }}

      - name: Build Docker context
        run: ./gradlew distribution -Dpgsql.version=16

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: dist
          path: build
          retention-days: 1

  push_image_ecr:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::783879612311:role/alfio-github-ecr-push
          aws-region: eu-central-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - uses: docker/build-push-action@v6
        with:
          context: ./dockerize
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/alfio:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/alfio:latest
